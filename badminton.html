<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0b2540">
<meta name="app-version" content="2026-07-07-matchmaking-safety-v3">
<title>คิวแบด — จัดกลุ่มก๊วนแบดมินตัน</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400..900&display=swap" rel="stylesheet">
<style>
  :root{
    --night:#0b2540;        /* penguin-back navy */
    --deep:#123a5e;
    --glacier:#1d6fa5;      /* primary action blue */
    --glacier-2:#2f86bd;
    --ice:#e7f3fb;          /* page background */
    --card:#ffffff;
    --ink:#102638;
    --muted:#5c7a91;
    --edge:#d8e8f2;
    --line:#f2f9ff;
    --beak:#f79b3e;         /* penguin-beak orange accent */
    --warn:#ef6349;
    --exempt:#8a5cf6;
    --rest:#a0895e;
    --aurora-a:#4fe0bd;
    --aurora-b:#7f9cf9;
    /* aliases kept for existing inline styles */
    --court:var(--glacier);
    --court-dark:var(--deep);
    --shuttle:var(--beak);
    --shadow:0 1px 2px rgba(13,42,68,.05),0 10px 30px rgba(13,42,68,.09);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:'Noto Sans Thai','Segoe UI',system-ui,sans-serif;
    background:var(--ice);
    background-image:
      radial-gradient(circle at 12% 8%, rgba(255,255,255,.95) 0 1.5px, transparent 2.2px),
      radial-gradient(circle at 64% 24%, rgba(255,255,255,.75) 0 1.3px, transparent 2px),
      radial-gradient(circle at 86% 52%, rgba(255,255,255,.85) 0 1.4px, transparent 2px),
      radial-gradient(circle at 30% 76%, rgba(255,255,255,.7) 0 1.3px, transparent 2px),
      radial-gradient(120% 70% at 85% 108%, rgba(184,220,242,.55), transparent 60%),
      radial-gradient(110% 60% at 8% 112%, rgba(199,230,247,.6), transparent 55%),
      linear-gradient(180deg,#e7f3fb 0%,#eaf5fc 40%,#dfeef9 100%);
    background-size:190px 190px,230px 230px,270px 270px,210px 210px,100% 100%,100% 100%,100% 100%;
    background-attachment:fixed;
    color:var(--ink);
    line-height:1.5; padding-bottom:96px;
  }
  h1,h2,h3{margin:0;font-weight:800;letter-spacing:-.01em}
  button{font-family:inherit;cursor:pointer;border:none;background:none}
  input,select,textarea{font-family:inherit;font-size:16px}
  ::selection{background:rgba(79,224,189,.35)}

  /* ===== header — arctic night, aurora + snowfall ===== */
  header{
    background:var(--night);
    background-image:
      radial-gradient(95% 130% at 88% -45%, rgba(79,224,189,.30), transparent 62%),
      radial-gradient(75% 120% at 4% -40%, rgba(127,156,249,.34), transparent 60%),
      radial-gradient(50% 65% at 55% -25%, rgba(247,155,62,.12), transparent 70%),
      linear-gradient(180deg,#103457 0%,#0b2540 100%);
    color:var(--line); padding:20px 16px 42px;
    position:relative; overflow:hidden;
  }
  header .aurora{
    position:absolute; inset:-45% -25%; pointer-events:none;
    background:
      radial-gradient(42% 26% at 28% 34%, rgba(79,224,189,.20), transparent 70%),
      radial-gradient(38% 24% at 72% 28%, rgba(127,156,249,.22), transparent 70%);
    animation:aurora 16s ease-in-out infinite alternate;
  }
  @keyframes aurora{
    from{transform:translateX(-4%) rotate(-2deg) scale(1)}
    to{transform:translateX(4%) rotate(2deg) scale(1.08)}
  }
  header .snow{
    position:absolute; inset:0; pointer-events:none; opacity:.85;
    background-image:
      radial-gradient(circle, rgba(255,255,255,.95) 0 1.4px, transparent 2.2px),
      radial-gradient(circle, rgba(255,255,255,.55) 0 1px, transparent 1.7px);
    background-size:130px 150px, 80px 100px;
    background-position:10px 0, 45px 40px;
    animation:snowfall 11s linear infinite;
  }
  @keyframes snowfall{to{background-position:10px 150px, 45px 140px}}
  header .ice-edge{
    position:absolute; left:0; right:0; bottom:-1px; width:100%; height:24px; display:block;
  }
  .brand{display:flex;align-items:center;gap:12px;position:relative;z-index:2}
  .brand .mark{
    width:46px;height:46px;border-radius:15px;flex-shrink:0;
    background:linear-gradient(165deg,#eaf7ff,#bfe0f5);
    display:grid;place-items:center;
    box-shadow:inset 0 0 0 2px rgba(255,255,255,.75),0 4px 14px rgba(4,20,38,.4);
  }
  .brand .mark svg{animation:bob 3.2s ease-in-out infinite;display:block}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-2.5px)}}
  header h1{font-size:21px;font-weight:900;text-shadow:0 1px 8px rgba(4,20,38,.35)}
  header p{margin:2px 0 0;font-size:12.5px;opacity:.82}
  .round-pill{
    position:absolute;top:18px;right:14px;z-index:2;
    background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.22);
    padding:5px 12px;border-radius:999px;font-size:12px;font-weight:700;
    backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
    box-shadow:0 2px 10px rgba(4,20,38,.25);
  }

  main{max-width:760px;margin:0 auto;padding:16px 14px}
  .tab-body{display:none} .tab-body.on{display:block;animation:fade .3s ease}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  /* ===== floating frosted nav ===== */
  nav{
    position:fixed;bottom:10px;left:50%;transform:translateX(-50%);
    width:min(440px,calc(100% - 20px));z-index:40;
    background:rgba(255,255,255,.82);
    backdrop-filter:blur(16px) saturate(1.4);-webkit-backdrop-filter:blur(16px) saturate(1.4);
    border:1px solid rgba(255,255,255,.85);
    border-radius:24px;display:flex;padding:6px;gap:4px;
    box-shadow:0 12px 34px rgba(13,42,68,.22),0 2px 8px rgba(13,42,68,.08);
  }
  nav button{
    flex:1;padding:9px 4px 10px;display:flex;flex-direction:column;position:relative;
    align-items:center;gap:3px;color:var(--muted);font-size:11px;font-weight:700;
    border-radius:18px;transition:background .2s,color .2s;
  }
  nav button .ic{line-height:1;display:grid;place-items:center;transition:transform .2s}
  nav button.on{
    color:var(--deep);
    background:linear-gradient(180deg,#e8f5fd,#d2eafa);
    box-shadow:inset 0 0 0 1px rgba(29,111,165,.14);
  }
  nav button.on .ic{transform:translateY(-1px) scale(1.06)}
  nav .badge{
    position:absolute;top:4px;left:calc(50% + 6px);background:var(--warn);
    color:#fff;font-size:9px;font-weight:800;min-width:16px;height:16px;
    border-radius:9px;display:grid;place-items:center;padding:0 4px;
    box-shadow:0 2px 6px rgba(239,99,73,.5);
  }

  /* ===== generic ===== */
  .card{background:linear-gradient(180deg,#ffffff,#fbfeff);border:1px solid var(--edge);border-radius:18px;
    box-shadow:var(--shadow);padding:14px;margin-bottom:12px}
  .row{display:flex;gap:8px;align-items:center}
  .between{justify-content:space-between}
  .wrap{flex-wrap:wrap}
  .sec-title{display:flex;align-items:center;justify-content:space-between;margin:2px 0 10px}
  .sec-title h2{font-size:15px;font-weight:800;display:flex;align-items:center;gap:6px}
  .sec-title .count{font-size:12px;color:var(--muted);font-weight:600;background:rgba(255,255,255,.7);
    border:1px solid var(--edge);padding:2px 10px;border-radius:999px}
  .muted{color:var(--muted)}
  .btn{
    background:linear-gradient(165deg,var(--glacier-2),var(--glacier) 55%,#175a8a);
    color:#fff;padding:12px 16px;border-radius:14px;
    font-weight:700;font-size:14px;display:inline-flex;align-items:center;gap:6px;
    justify-content:center;transition:transform .08s,filter .15s,box-shadow .15s;
    box-shadow:0 6px 16px rgba(23,90,138,.32),inset 0 1px 0 rgba(255,255,255,.25);
  }
  .btn:active{transform:scale(.97);filter:brightness(1.08)}
  .btn.block{width:100%}
  .btn.ghost{background:rgba(255,255,255,.75);color:var(--glacier);
    box-shadow:inset 0 0 0 1.5px var(--edge),0 2px 8px rgba(13,42,68,.06)}
  .btn.sm{padding:8px 12px;font-size:13px;border-radius:12px}
  .btn.warn{background:linear-gradient(165deg,#ff8a63,var(--warn) 60%,#dd4e35);
    box-shadow:0 6px 16px rgba(239,99,73,.35),inset 0 1px 0 rgba(255,255,255,.25)}
  .btn.mini{padding:5px 11px;font-size:12px;border-radius:10px}
  .field{margin-bottom:10px}
  .field label{display:block;font-size:12px;font-weight:700;margin-bottom:4px;color:var(--muted)}
  .field input,.field textarea,.field select{
    width:100%;padding:11px 12px;border:1.5px solid var(--edge);border-radius:12px;
    background:#f7fbfe;outline:none;transition:border-color .15s,box-shadow .15s}
  .field input:focus,.field textarea:focus,.field select:focus{
    border-color:var(--glacier);box-shadow:0 0 0 3px rgba(29,111,165,.12)}
  textarea{resize:vertical;min-height:52px}

  /* ===== skill: fish (penguin currency) ===== */
  .pips{display:inline-flex;gap:2px;vertical-align:-2px}
  .pip{color:#cadfec;display:inline-flex}
  .pip.on{color:var(--beak)}
  .pipbtns{display:flex;gap:6px}
  .pipbtns button{width:40px;height:40px;border-radius:12px;border:1.5px solid var(--edge);
    background:#f7fbfe;font-weight:800;color:var(--muted);transition:all .15s}
  .pipbtns button.on{background:linear-gradient(165deg,var(--glacier-2),var(--glacier));
    color:#fff;border-color:transparent;box-shadow:0 4px 10px rgba(29,111,165,.35)}

  /* ===== perks ===== */
  .perkbar{display:flex;gap:6px;flex-wrap:wrap;margin-top:2px}
  .perk-tog{padding:6px 12px;border-radius:999px;font-size:12.5px;font-weight:600;
    border:1.5px solid var(--edge);background:#f7fbfe;color:var(--ink);transition:all .15s}
  .perk-tog.on{background:linear-gradient(165deg,#ffb35c,var(--beak));border-color:transparent;color:#fff;
    box-shadow:0 3px 9px rgba(247,155,62,.4)}
  .tag{display:inline-block;padding:2px 9px;border-radius:999px;font-size:11px;font-weight:700;
    background:#e8f4fb;color:var(--deep);border:1px solid #d5e9f5;margin:3px 4px 0 0}

  /* ===== player row ===== */
  .plist{display:flex;flex-direction:column;gap:9px}
  .pcard{background:linear-gradient(180deg,#ffffff,#fbfeff);border:1px solid var(--edge);
    border-radius:16px;padding:11px 12px;
    display:flex;gap:11px;align-items:flex-start;box-shadow:var(--shadow);
    transition:transform .15s,box-shadow .15s}
  @media(hover:hover){.pcard:hover{transform:translateY(-1px);box-shadow:0 4px 8px rgba(13,42,68,.06),0 14px 34px rgba(13,42,68,.12)}}
  .pcard.dim{opacity:.55}
  .avatar{width:46px;height:46px;border-radius:15px;flex-shrink:0;display:grid;place-items:center;
    background:linear-gradient(180deg,#e3f2fc,#c6e3f6);
    box-shadow:inset 0 0 0 1.5px rgba(255,255,255,.85),0 2px 6px rgba(13,42,68,.08)}
  .avatar svg{display:block}
  .avatar.sm{width:34px;height:34px;border-radius:11px}
  .pcard .body{flex:1;min-width:0}
  .pname{font-weight:800;font-size:15px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
  .status-dot{font-size:11px;font-weight:700;padding:1px 8px;border-radius:999px}
  .s-wait{background:#dff0fa;color:var(--deep)}
  .s-play{background:#ffedc7;color:#8a5a00}
  .s-done{background:#e9edf0;color:var(--muted)}
  .s-rest{background:#f2e8d6;color:var(--rest)}
  .s-exempt{background:#efe7ff;color:var(--exempt)}
  .s-out{background:#edf1f4;color:#7b8790}
  .pmeta{font-size:12.5px;color:var(--muted);margin-top:3px;word-break:break-word;
    display:flex;align-items:center;gap:5px;flex-wrap:wrap}
  .pcomment{font-size:12.5px;color:var(--ink);margin-top:3px;font-style:italic;opacity:.8}
  .pcard .acts{display:flex;flex-direction:column;gap:5px;align-items:flex-end}
  .icon-btn{width:31px;height:31px;border-radius:10px;border:1.5px solid var(--edge);
    background:#f7fbfe;font-size:14px;display:grid;place-items:center;color:var(--deep);
    transition:background .15s}
  .icon-btn:active{background:#e4f1fa}

  /* ===== courts ===== */
  .courts-grid{display:grid;grid-template-columns:1fr;gap:12px}
  @media(min-width:560px){.courts-grid{grid-template-columns:1fr 1fr}}
  .court-card{border:1px solid var(--edge);border-radius:18px;overflow:hidden;
    background:var(--card);box-shadow:var(--shadow)}
  .court-head{
    background:var(--night);
    background-image:radial-gradient(120% 160% at 85% -60%, rgba(79,224,189,.25), transparent 60%),
      linear-gradient(135deg,#164369,#0d2b49);
    color:var(--line);padding:11px 14px;
    display:flex;align-items:center;justify-content:space-between;position:relative}
  .court-head::after{content:"";position:absolute;left:14px;right:14px;bottom:0;height:2px;
    background:repeating-linear-gradient(90deg,var(--line) 0 6px,transparent 6px 11px);opacity:.5}
  .court-head h3{font-size:15px}
  .court-status{font-size:11px;opacity:.9;display:inline-flex;align-items:center;gap:5px;
    background:rgba(255,255,255,.12);padding:3px 10px;border-radius:999px;
    border:1px solid rgba(255,255,255,.15)}
  .live-dot{width:7px;height:7px;border-radius:50%;background:var(--aurora-a);display:inline-block;
    box-shadow:0 0 6px var(--aurora-a);animation:pulse 1.6s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.45;transform:scale(.8)}}
  .court-body{padding:13px 14px}
  .empty-court{text-align:center;padding:8px 4px}
  .empty-court .art{opacity:.9;margin-bottom:2px}
  .matchup{display:flex;align-items:stretch;gap:8px}
  .side{flex:1;background:linear-gradient(180deg,#eaf4fb,#e0eef8);border-radius:13px;padding:10px;
    border:1px solid #dcebf6}
  .side h4{font-size:11px;color:var(--muted);margin:0 0 6px;text-transform:uppercase;letter-spacing:.05em}
  .side .p{font-weight:700;font-size:14px;display:flex;justify-content:space-between;gap:6px;padding:3px 0}
  .side .p small{color:var(--glacier);font-weight:800}
  .vs{display:flex;flex-direction:column;align-items:center;justify-content:center}
  .vs span{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;
    background:linear-gradient(165deg,#164369,#0d2b49);color:#fff;
    font-weight:800;font-size:11px;box-shadow:0 3px 10px rgba(13,42,68,.3)}
  .sidesum{font-size:11px;color:var(--muted);text-align:center;margin-top:4px}

  /* ===== queue preview ===== */
  .qstrip{display:flex;gap:8px;overflow-x:auto;padding:2px 0 8px;-webkit-overflow-scrolling:touch;
    scrollbar-width:none}
  .qstrip::-webkit-scrollbar{display:none}
  .qchip{flex-shrink:0;background:rgba(255,255,255,.9);border:1.5px solid var(--edge);border-radius:13px;
    padding:7px 12px;font-size:13px;font-weight:700;display:flex;align-items:center;gap:7px;
    box-shadow:0 2px 8px rgba(13,42,68,.06)}
  .qchip .num{width:19px;height:19px;border-radius:7px;
    background:linear-gradient(165deg,var(--glacier-2),var(--glacier));color:#fff;
    font-size:10px;display:grid;place-items:center;font-weight:800}
  .qchip .games{font-size:10.5px;color:var(--muted);font-weight:700}
  .qchip.exempt-chip{border-color:#d9c9ff}
  .qchip.exempt-chip .num{background:linear-gradient(165deg,#a586f9,var(--exempt))}

  /* ===== modal ===== */
  .scrim{position:fixed;inset:0;background:rgba(6,22,40,.55);z-index:50;display:none;
    align-items:flex-end;justify-content:center;backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px)}
  .scrim.on{display:flex}
  .sheet{background:linear-gradient(180deg,#ffffff,#f6fbfe);width:100%;max-width:560px;
    border-radius:26px 26px 0 0;border:1px solid rgba(255,255,255,.8);
    padding:16px 16px 24px;max-height:90vh;overflow-y:auto;animation:up .3s cubic-bezier(.2,.9,.3,1);
    will-change:transform}
  @media(min-width:560px){.sheet{border-radius:26px;margin-bottom:auto;margin-top:auto}
    .scrim{align-items:center}}
  @keyframes up{from{transform:translateY(36px);opacity:.5}to{transform:none;opacity:1}}
  /* The visual pill has a generous touch target so the sheet can actually be dragged down on mobile. */
  .sheet .grab{height:28px;width:100%;margin:-8px 0 5px;display:flex;align-items:center;justify-content:center;
    touch-action:none;cursor:grab;user-select:none;-webkit-user-select:none}
  .sheet .grab::before{content:"";display:block;width:40px;height:4.5px;border-radius:99px;background:var(--edge);
    transition:background .15s,transform .15s}
  .sheet .grab:active{cursor:grabbing}
  .sheet.dragging{animation:none;transition:none}
  .sheet.dragging .grab::before{background:#b8d6e9;transform:scaleX(1.08)}
  .sheet.snapback{transition:transform .22s cubic-bezier(.2,.85,.25,1)}
  .sheet.closing{animation:none;transition:transform .22s cubic-bezier(.2,.8,.25,1),opacity .22s ease;opacity:.35}
  .sheet h3{font-size:17px;margin-bottom:12px}

  /* pick list in match modal */
  .pick{display:flex;align-items:center;gap:10px;padding:8px 4px;border-bottom:1px solid #e6f1f8;
    border-radius:10px;transition:background .12s}
  .pick:last-child{border-bottom:none}
  .pick.sel{background:#eef7fd}
  .pick .cb{width:24px;height:24px;border-radius:8px;border:2px solid var(--edge);flex-shrink:0;
    display:grid;place-items:center;font-size:14px;color:#fff;transition:all .15s}
  .pick.sel .cb{background:linear-gradient(165deg,var(--glacier-2),var(--glacier));border-color:var(--glacier)}
  .pick .nm{flex:1;font-weight:700;font-size:14px}
  .pick .sk{font-size:12px;color:var(--glacier);font-weight:800}

  .balance-note{background:linear-gradient(180deg,#eaf4fb,#e0eef8);border:1px solid #dcebf6;
    border-radius:13px;padding:10px 13px;font-size:13px;
    margin:8px 0;display:flex;align-items:center;justify-content:space-between}
  .balance-note b{font-size:15px}
  .swaphint{font-size:12px;color:var(--muted);text-align:center;margin:8px 0}

  .empty-state{text-align:center;padding:28px 16px;color:var(--muted)}
  .empty-state .art{margin-bottom:4px;opacity:.95}
  .empty-state .ic{opacity:.35;margin-bottom:6px}
  .empty-state p{margin:4px 0;font-size:13.5px}

  .hist-item{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid #e6f1f8;font-size:13px}
  .hist-item:last-child{border-bottom:none}
  .hist-item .ct{font-weight:800;color:var(--glacier);flex-shrink:0}
  .toast{position:fixed;bottom:104px;left:50%;transform:translateX(-50%) translateY(20px);
    background:linear-gradient(165deg,#16395c,var(--night));color:#fff;padding:11px 18px;
    border-radius:14px;font-size:13px;font-weight:600;border:1px solid rgba(255,255,255,.12);
    opacity:0;pointer-events:none;transition:.25s;z-index:60;white-space:nowrap;
    display:flex;align-items:center;gap:7px;box-shadow:0 10px 28px rgba(6,22,40,.4)}
  .toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
  .danger-link{color:var(--warn);font-size:12px;font-weight:700;background:none;padding:4px}
  .confirm-hero{display:flex;gap:12px;align-items:center;padding:14px;border-radius:18px;
    background:linear-gradient(135deg,#eef8fe,#e4f1fb 55%,#dcedfa);border:1px solid #d8e8f2;margin-bottom:12px}
  .confirm-hero .artbox{width:78px;height:72px;border-radius:18px;flex-shrink:0;display:grid;place-items:center;
    background:linear-gradient(180deg,#ffffff,#eef7fd);box-shadow:inset 0 0 0 1.5px rgba(255,255,255,.95),0 6px 18px rgba(13,42,68,.08)}
  .confirm-hero .eyebrow{font-size:11px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--glacier);margin-bottom:2px}
  .confirm-hero p{margin:4px 0 0;font-size:13px;color:var(--muted)}
  .confirm-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
  .confirm-stat{padding:11px 12px;border-radius:14px;background:#f7fbfe;border:1px solid var(--edge)}
  .confirm-stat .lbl{font-size:11px;color:var(--muted);margin-bottom:3px}
  .confirm-stat b{font-size:17px;color:var(--deep)}
  .confirm-panel{padding:12px;border-radius:16px;background:linear-gradient(180deg,#ffffff,#fbfeff);border:1px solid var(--edge)}
  .confirm-panel h4{font-size:13px;margin:0 0 8px;color:var(--deep)}
  .confirm-points{display:flex;flex-direction:column;gap:8px}
  .confirm-point{display:flex;gap:9px;align-items:flex-start;padding:9px 10px;border-radius:12px;background:#f7fbfe;border:1px solid #e4eff7;font-size:13px;color:var(--ink)}

  /* ===== game-type chooser ===== */
  .gtype-btn{display:flex;align-items:center;gap:11px;width:100%;text-align:left;

  .gtype-chip:active{background:#e4f1fa}
  @media(hover:hover){.gtype-chip:hover{border-color:var(--glacier)}}

  /* ===== queue fairness + batch court controls ===== */

<script>
/* ---------------- error surfacing ---------------- */
window.addEventListener('error',e=>{
  const m=(e.error&&e.error.message)||e.message||'unknown';
  try{
    const t=document.getElementById('toast');
    if(t){
      t.textContent='เกิดข้อผิดพลาด: '+String(m);
      t.classList.add('on');
      clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('on'),5000);
    }
  }catch(_){}
});

/* ---------------- icons ---------------- */
const ICONS = {
  shuttle:s=>`<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="6" r="2.3" fill="currentColor" stroke="none"/><path d="M12 8.3 7.3 19M12 8.3l-1.8 10.8M12 8.3l1.8 10.8M12 8.3l4.7 10.7"/></svg>`,
  users:s=>`<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>`,
  history:s=>`<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>`,
  zap:s=>`<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M4 14a1 1 0 0 1-.78-1.63l9.9-10.2a.5.5 0 0 1 .86.46l-1.92 6.02A1 1 0 0 0 13 10h7a1 1 0 0 1 .78 1.63l-9.9 10.2a.5.5 0 0 1-.86-.46l1.92-6.02A1 1 0 0 0 11 14z"/></svg>`,
  pencil:s=>`<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.174 6.812a1 1 0 0 0-3.986-3.987L3.842 16.174a2 2 0 0 0-.5.83l-1.321 4.352a.5.5 0 0 0 .623.622l4.353-1.32a2 2 0 0 0 .83-.497z"/><path d="m15 5 4 4"/></svg>`,
  check:s=>`<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>`,
  play:s=>`<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="6 3 20 12 6 21 6 3"/></svg>`,
  pause:s=>`<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="currentColor" stroke="none"><rect x="14" y="4" width="4" height="16" rx="1"/><rect x="6" y="4" width="4" height="16" rx="1"/></svg>`,
  warn:s=>`<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>`,
  fish:s=>`<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M2.5 12c0-2.9 3.4-5.3 7.5-5.3s7.5 2.4 7.5 5.3-3.4 5.3-7.5 5.3S2.5 14.9 2.5 12Zm15.5 0 4-3.2v6.4L18 12Z"/><circle cx="6.6" cy="10.8" r="1" fill="#fff"/></svg>`
};
function icon(name,size){size=size||16;return (ICONS[name]?ICONS[name](size):'');}

/* ---------------- penguins ---------------- */
const SCARVES=['#ef6349','#f79b3e','#2fbf9b','#7f9cf9','#e56aa4','#38a8dd'];
function scarfFor(name){
  let h=0;for(const c of name)h=(h*31+c.charCodeAt(0))%SCARVES.length;return SCARVES[h];
}
function penguinBody(scarf){
  return `<ellipse cx="9.5" cy="37" rx="5.5" ry="12" fill="#16324e" transform="rotate(16 9.5 37)"/>
  <ellipse cx="54.5" cy="37" rx="5.5" ry="12" fill="#16324e" transform="rotate(-16 54.5 37)"/>
  <ellipse cx="32" cy="35" rx="21" ry="24" fill="#16324e"/>
  <ellipse cx="32" cy="41" rx="13.5" ry="16" fill="#fff"/>
  <ellipse cx="24" cy="58.5" rx="6" ry="3.2" fill="#f5a04a"/>
  <ellipse cx="40" cy="58.5" rx="6" ry="3.2" fill="#f5a04a"/>
  ${scarf?`<path d="M15.5 32.5c5 4 28 4 33 0l-1.8 6.4c-8.2 4.8-21.2 4.8-29.4 0Z" fill="${scarf}"/>
  <rect x="27.5" y="37.5" width="9" height="13" rx="4" fill="${scarf}"/>`:''}
  <circle cx="25" cy="24.5" r="4.4" fill="#fff"/><circle cx="39" cy="24.5" r="4.4" fill="#fff"/>
  <circle cx="26" cy="25.5" r="2.1" fill="#0c1f33"/><circle cx="38" cy="25.5" r="2.1" fill="#0c1f33"/>
  <circle cx="20.5" cy="29.5" r="2.2" fill="#ff9d9d" opacity=".5"/><circle cx="43.5" cy="29.5" r="2.2" fill="#ff9d9d" opacity=".5"/>
  <path d="M28.4 29.5 32 34l3.6-4.5Z" fill="#f5a04a"/>`;
}
function penguinSVG(scarf,s){
  return `<svg width="${s}" height="${s}" viewBox="0 0 64 64" aria-hidden="true">${penguinBody(scarf)}</svg>`;
}
function penguinArt(s){
  return `<svg width="${s}" height="${Math.round(s*0.8)}" viewBox="0 0 86 66" aria-hidden="true">
    <g>${penguinBody('#ef6349')}</g>
    <g transform="translate(72,48) rotate(20)" stroke="#9db9cc" stroke-width="1.6" stroke-linecap="round" fill="none">
      <path d="M-3 7-7.5 -7M-1 6.5-2.5 -8M1 6.5 2.5 -8M3 7 7.5 -7"/>
      <path d="M-7.5 -7Q0 -12 7.5 -7"/>
      <circle cx="0" cy="9" r="3.8" fill="#f5a04a" stroke="none"/>
    </g>
  </svg>`;
}

/* ---------------- state ---------------- */
const PERKS = ['เล่นหน้าดี','เล่นหลังดี','ตบหนัก','วางลูกดี','วิ่งไว','เกมรับดี','สมาธิดี'];
/* Game styles the user can pick per court. 'auto' keeps the default balanced matchmaking. */
const GAME_TYPES = {
  auto:   {label:'จับคู่อัตโนมัติ', desc:'สุ่มจากคนที่ถึงคิว พร้อมบาลานซ์ฝีมือ', icon:'zap'},
  control:{label:'เกมคุม',          desc:'ฝั่งละ 1 มือแรง (4–5) + 1 มือเบา (1–3)', icon:'users'},
  heavy:  {label:'เกมหนัก',         desc:'มือแรงทั้งหมด (ฝีมือ 4–5)', icon:'shuttle'},
  light:  {label:'เกมเบา',          desc:'มือเบาทั้งหมด (ฝีมือ 1–3)', icon:'fish'}
};
const VALID_STATUSES = new Set(['wait','rest','done']);
const store = {
  schemaVersion: 5,
  players: [],
  courts: [],
  matches: [],
  history: [],
  round: 1,
  roundUpdatedAt: 0,
  session: null,
  updatedAt: 0,
  wipedAt: 0,
  deletedPlayers: {},
  deletedCourts: {},
  deletedMatches: {}
};
let editingId=null, matchDraft=null, batchDraft=null;
let cloudPushTimer=null, dbRef=null, groupCode=null, cloudUser=null;
let cloudAvailable=false, authObserverAttached=false, connectionToken=0, suppressCloudWrite=false, forceGroupSheet=false, pendingGroupSwitch=null;

/* ---------------- safe values ---------------- */
function safeText(value){return String(value??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function jsArg(value){
  return JSON.stringify(String(value??'')).replace(/[<>&']/g,c=>({'<':'\\u003c','>':'\\u003e','&':'\\u0026',"'":'\\u0027'}[c]));
}
function clampNumber(value,min,max,fallback){
  const n=Number(value);
  return Number.isFinite(n)?Math.max(min,Math.min(max,n)):fallback;
}
function cleanText(value,fallback='',max=500){
  const text=String(value??'').trim().slice(0,max);

  const playerIdSet=new Set(store.players.map(p=>p.id));

function mergeRecords(remoteRecords,localRecords,tombstones,wipedAt,prefix='record'){
  const all=new Map();
  const take=(record,index)=>{
    if(!record||typeof record!=='object')return;
    const fallback=prefix+'_legacy_'+hashText(JSON.stringify(record)+'|'+index).toString(36);
    const id=typeof record.id==='string'&&record.id?String(record.id):fallback;
    const candidate={...record,id};
    const previous=all.get(id);
    if(!previous||recordTime(candidate)>=recordTime(previous))all.set(id,candidate);
  };
  asRecords(remoteRecords).forEach(take);
  asRecords(localRecords).forEach(take);
  return [...all.values()].filter(record=>{
    const updated=recordTime(record);
    const deleted=Number(tombstones[record.id])||0;
    return (!wipedAt||updated>wipedAt)&&(!deleted||updated>deleted);
  });
}
function resolveMatchConflicts(matches){
  const courts=new Set(),players=new Set();
  return [...matches].sort((a,b)=>(Number(a.startedAt)||recordTime(a))-(Number(b.startedAt)||recordTime(b))||String(a.id).localeCompare(String(b.id))).filter(m=>{
    const ids=uniqueStrings([...(Array.isArray(m.side1)?m.side1:[]),...(Array.isArray(m.side2)?m.side2:[])]);
    if(courts.has(m.courtId)||ids.some(id=>players.has(id)))return false;
    courts.add(m.courtId);ids.forEach(id=>players.add(id));return true;
  });
}
function mergeStores(remote,local){
  const r=remote&&typeof remote==='object'?remote:{};
  const l=local&&typeof local==='object'?local:{};
  const wipedAt=Math.max(Number(r.wipedAt)||0,Number(l.wipedAt)||0);
  const deletedPlayers=mergeTombstones(r.deletedPlayers,l.deletedPlayers);
  const deletedCourts=mergeTombstones(r.deletedCourts,l.deletedCourts);
  const deletedMatches=mergeTombstones(r.deletedMatches,l.deletedMatches);
  const players=mergeRecords(r.players,l.players,deletedPlayers,wipedAt,'p');
  const courts=mergeRecords(r.courts,l.courts,deletedCourts,wipedAt,'c');
  const history=mergeRecords(r.history,l.history,{},wipedAt,'h');
  const matches=resolveMatchConflicts(mergeRecords(r.matches,l.matches,deletedMatches,wipedAt,'m'));
  const rs=r.session&&typeof r.session==='object'?r.session:{};
  const ls=l.session&&typeof l.session==='object'?l.session:{};
  const remoteSessionTime=recordTime(rs),localSessionTime=recordTime(ls);
  const remoteSessionWins=remoteSessionTime>=localSessionTime;
  const session=cloneData(remoteSessionWins?rs:ls);
  const sessionChanged=String(rs.id||'')!==String(ls.id||'');
  const roundSource=sessionChanged?(remoteSessionWins?r:l):((Number(r.roundUpdatedAt)||0)>=(Number(l.roundUpdatedAt)||0)?r:l);
  return {
    schemaVersion:5,
    players,courts,matches,history,
    session,
    round:Math.max(1,Math.floor(Number(roundSource.round)||1)),
    roundUpdatedAt:Number(roundSource.roundUpdatedAt)||recordTime(session),
    updatedAt:Math.max(Number(r.updatedAt)||0,Number(l.updatedAt)||0),
    wipedAt,deletedPlayers,deletedCourts,deletedMatches
  };
}

function attachCloudValueHandler(ref,code,token){
  ref.on('value',snap=>{
    if(token!==connectionToken||code!==groupCode)return;
    const remote=snap.val();
    if(remote){
      const remoteCanonical=mergeStores(remote,{});
      const merged=mergeCloudSnapshot(remote);
      const before=JSON.stringify(merged);
      suppressCloudWrite=true;
      replaceStore(merged);
      render('cloud');
      suppressCloudWrite=false;
      const repaired=remote.schemaVersion!==5
        ||JSON.stringify(merged)!==JSON.stringify(remoteCanonical)
        ||JSON.stringify(store)!==before;
      if(repaired)pushToCloud(true);
    }else if(store.players.length||store.history.length||store.matches.length){
      markStoreChanged();pushToCloud(true);

async function attachGroupRef(code){
  if(!cloudAvailable||!cloudUser)return;
  const token=++connectionToken;
  if(dbRef){dbRef.off();dbRef=null;}
  const database=firebase.database();
  const ref=database.ref('groups/'+encodeGroupCode(code));
  let existingSnapshot=null;
  try{
    const snapshot=await ref.once('value');
    if(token!==connectionToken||code!==groupCode)return;
    existingSnapshot=snapshot.val();
    if(!existingSnapshot){
      const legacyRef=database.ref('groups/'+legacyEncodeGroupCode(code));
      const legacySnapshot=await legacyRef.once('value');
      if(token!==connectionToken||code!==groupCode)return;
      if(legacySnapshot.val()){
        existingSnapshot=legacySnapshot.val();
        await ref.transaction(current=>current||{...existingSnapshot,schemaVersion:5});
      }
    }
  }catch(e){
    // Continue with the live listener; a transient read error should not disable local use.
    console.warn('Initial cloud read failed',e);
  }
  if(token!==connectionToken||code!==groupCode)return;
  const pending=pendingGroupSwitch&&pendingGroupSwitch.code===code?pendingGroupSwitch:null;
  if(pending){
    // Joining an existing group must not merge or upload the previous group's local data.
    // If the destination is empty, retaining the current state intentionally creates a renamed copy.
    if(existingSnapshot&&!pending.fromCache){replaceStore(existingSnapshot);render('cloud');}
    pendingGroupSwitch=null;
  }
  dbRef=ref;
  attachCloudValueHandler(ref,code,token);
}
function connectGroup(code){
  const value=normalizedGroupCode(code);
  if(!value){toast('ใส่รหัสกลุ่มก่อนนะ');return;}
  const switching=groupCode&&groupCode!==value;
  if(switching){
    const cached=readGroupCache(value);
    pendingGroupSwitch={code:value,fromCache:!!cached};
    if(cached){replaceStore(cached);render('cloud');}
  }
  groupCode=value;
  const label=document.getElementById('groupCodeLabel');if(label)label.textContent=value;
  if(!cloudAvailable){save();return;}
  if(cloudUser){attachGroupRef(value);return;}
  firebase.auth().signInAnonymously().catch(e=>toast('เชื่อมต่อคลาวด์ไม่สำเร็จ: '+e.message));
}
function pushToCloud(immediate=false){
  if(!dbRef||!cloudAvailable||suppressCloudWrite)return;
  const write=()=>{
    const outgoing=cloneData(store);
    const transaction=dbRef.transaction(current=>mergeStores(current||{},outgoing));
    if(transaction&&typeof transaction.catch==='function')transaction.catch(e=>toast('บันทึกขึ้นคลาวด์ไม่สำเร็จ: '+e.message));
  };

}

  return sessionGamesOf(a)-sessionGamesOf(b)
    || sessionQueueOf(a)-sessionQueueOf(b)
    || (Number(a.sessionTie)||0)-(Number(b.sessionTie)||0);
}
function partnerTime(player){return Number(player?.partnerUpdatedAt)||Number(player?.updatedAt)||0;}
function partnerOf(player){
  if(!player||!player.partnerId)return null;
  const partner=byId(player.partnerId);
  return partner&&partner.partnerId===player.id?partner:null;
}
function isPartnerLocked(player){
  const partner=partnerOf(player);
  return !!(partner&&player.partnerLocked&&partner.partnerLocked);
}
function partnerUnit(player,eligibleIds=null){
  const partner=isPartnerLocked(player)?partnerOf(player):null;
  if(partner&&(!eligibleIds||eligibleIds.has(partner.id)))return [player,partner];
  return player?[player]:[];
}
function playerIsPriorityExempt(player){
  const partner=isPartnerLocked(player)?partnerOf(player):null;
  return !!(player?.exempt||partner?.exempt);
}
function partnerMeta(player,interactive=false){
  const partner=partnerOf(player);
  if(!partner)return '';
  const locked=isPartnerLocked(player);
  const button=interactive
    ?`<button class="btn mini ghost" style="padding:3px 8px;margin-left:2px" onclick='togglePartnerLock(${jsArg(player.id)})'>${locked?'แยกคู่':'เล่นคู่กัน'}</button>`
    :`<span class="status-dot ${locked?'s-wait':'s-out'}" style="margin-left:2px">${locked?'เล่นคู่กัน':'แยกคู่'}</span>`;
  return `<div class="pmeta" style="gap:5px">คู่ประจำ: <b>${safeText(partner.name)}</b>${button}</div>`;
}
function currentSessionFloor(excludeIds=null){
  const excluded=new Set(Array.isArray(excludeIds)?excludeIds:(excludeIds?[excludeIds]:[]));
  // Include everyone still participating, even if they have already finished this round,
  // so a player who joins late starts at the true session floor instead of jumping from 0.
  const active=store.players.filter(p=>!excluded.has(p.id)&&p.inSession&&p.status!=='rest'&&!playerIsPriorityExempt(p));
  return active.length?Math.min(...active.map(sessionGamesOf)):0;
}
function repairPartnerLinks(){
  const players=Array.isArray(store.players)?store.players:[];
  const index=new Map(players.map(p=>[p.id,p]));
  players.forEach(p=>{
    if(!p.partnerId||p.partnerId===p.id||!index.has(p.partnerId)){
      p.partnerId=null;p.partnerLocked=false;
    }
  });
  const claimed=new Set();
  const claims=players.filter(p=>p.partnerId).sort((a,b)=>partnerTime(b)-partnerTime(a)||String(a.id).localeCompare(String(b.id)));
  claims.forEach(p=>{
    if(!p.partnerId||claimed.has(p.id))return;
    const partner=index.get(p.partnerId);
    if(!partner||claimed.has(partner.id)){p.partnerId=null;p.partnerLocked=false;return;}
    const pTime=partnerTime(p),partnerTimeValue=partnerTime(partner);
    // A newer unlink on the other profile must not be resurrected by an older copy.
    if(!partner.partnerId&&partnerTimeValue>=pTime){p.partnerId=null;p.partnerLocked=false;return;}
    // A newer relationship on the other profile wins over this stale claim.
    if(partner.partnerId&&partner.partnerId!==p.id&&partnerTimeValue>pTime){p.partnerId=null;p.partnerLocked=false;return;}
    const reciprocal=partner.partnerId===p.id;
    const locked=reciprocal
      ?!!(p.partnerLocked&&partner.partnerLocked)
      :(pTime>=partnerTimeValue?!!p.partnerLocked:!!partner.partnerLocked);
    const changedAt=Math.max(pTime,partnerTimeValue);
    p.partnerId=partner.id;partner.partnerId=p.id;
    p.partnerLocked=locked;partner.partnerLocked=locked;
    p.partnerUpdatedAt=changedAt;partner.partnerUpdatedAt=changedAt;
    claimed.add(p.id);claimed.add(partner.id);
  });
  players.forEach(p=>{
    if(p.partnerId&&!claimed.has(p.id)){p.partnerId=null;p.partnerLocked=false;}
  });
}
function clearPartnerLinks(playerId,at=Date.now()){
  const player=byId(playerId);
  if(!player)return;
  const related=new Set([player.id]);
  if(player.partnerId)related.add(player.partnerId);
  store.players.forEach(other=>{if(other.partnerId===player.id)related.add(other.id);});
  related.forEach(id=>{
    const target=byId(id);if(!target)return;
    target.partnerId=null;target.partnerLocked=false;target.partnerUpdatedAt=at;touchPlayer(target,at);
  });
}
function setPreferredPartner(playerId,requestedPartnerId,at=Date.now()){
  const player=byId(playerId);
  const target=requestedPartnerId?byId(requestedPartnerId):null;
  if(!player)return {ok:false,message:'ไม่พบผู้เล่นคนนี้'};
  if(requestedPartnerId&&(!target||target.id===player.id))return {ok:false,message:'เลือกคู่ประจำไม่ถูกต้อง'};
  const current=partnerOf(player);
  if((current?.id||'')===(target?.id||''))return {ok:true,changed:false};
  if(target&&target.partnerId&&target.partnerId!==player.id)return {ok:false,message:target.name+' มีคู่ประจำอยู่แล้ว'};
  clearPartnerLinks(player.id,at);
  if(!target)return {ok:true,changed:true};
  clearPartnerLinks(target.id,at);
  player.partnerId=target.id;target.partnerId=player.id;
  player.partnerLocked=true;target.partnerLocked=true;
  player.partnerUpdatedAt=at;target.partnerUpdatedAt=at;
  touchPlayer(player,at);touchPlayer(target,at);
  const playing=new Set(playingIds());
  if(!playing.has(player.id)&&!playing.has(target.id))syncLockedPartnerSession(player,target,at);
  return {ok:true,changed:true};
}
function syncLockedPartnerSession(player,partner,at=Date.now()){
  if(!player||!partner||(!player.inSession&&!partner.inSession))return;
  const playing=new Set(playingIds());
  if(playing.has(player.id)||playing.has(partner.id))return;
  const unit=[player,partner];
  const sameSession=unit.every(p=>p.sessionId===store.session.id);
  const games=sameSession?Math.max(...unit.map(sessionGamesOf)):currentSessionFloor(unit.map(p=>p.id));
  const tie=Math.min(...unit.map(p=>Number(p.sessionTie)||sessionTieFor(p.id)));
  const status=unit.some(p=>p.status==='rest')?'rest':unit.every(p=>p.status==='done')?'done':'wait';
  const restMode=status==='rest'&&unit.some(p=>p.restMode==='one')?'one':(status==='rest'?'manual':'none');
  const restUntil=restMode==='one'?Math.max(...unit.map(p=>Number(p.restUntilMatchCount)||0),completedMatchesOfSession()+1):0;
  const restReturnStatus=restMode==='one'&&unit.every(p=>p.restReturnStatus==='done')?'done':'wait';
  unit.forEach(p=>{
    p.inSession=true;p.sessionId=store.session.id;p.sessionGames=games;p.sessionTie=tie;
    p.sessionQueueAt=at;p.status=status;p.restMode=restMode;p.restUntilMatchCount=restUntil;p.restReturnStatus=restReturnStatus;touchPlayer(p,at);
  });
}
function togglePartnerLock(id){
  const player=byId(id),partner=partnerOf(player);
  if(!player||!partner){toast('ผู้เล่นคนนี้ยังไม่มีคู่ประจำ');return;}
  const playing=new Set(playingIds());
  if(playing.has(player.id)||playing.has(partner.id)){
    toast('เปลี่ยนโหมดคู่หลังจบเกม เพื่อไม่กระทบเกมปัจจุบัน');return;
  }
  const at=Date.now();
  const next=!isPartnerLocked(player);
  player.partnerLocked=next;partner.partnerLocked=next;
  player.partnerUpdatedAt=at;partner.partnerUpdatedAt=at;
  touchPlayer(player,at);touchPlayer(partner,at);
  if(next)syncLockedPartnerSession(player,partner,at);
  render();
  toast(next?player.name+' และ '+partner.name+' เล่นคู่กันแล้ว':player.name+' และ '+partner.name+' แยกคู่แล้ว');
}
function resetPartnerLocksForSession(at=Date.now()){
  const seen=new Set();
  store.players.forEach(player=>{
    const partner=partnerOf(player);
    if(!partner||seen.has(player.id)||seen.has(partner.id))return;
    seen.add(player.id);seen.add(partner.id);
    player.partnerLocked=true;partner.partnerLocked=true;
    player.partnerUpdatedAt=at;partner.partnerUpdatedAt=at;
    touchPlayer(player,at);touchPlayer(partner,at);
  });
}
function queueEligibleSet(){
  const playing=new Set(playingIds());
  const base=store.players.filter(p=>p.inSession&&!playing.has(p.id)&&p.status!=='rest');
  const ids=new Set(base.map(p=>p.id));
  return new Set(base.filter(p=>{
    const partner=isPartnerLocked(p)?partnerOf(p):null;
    return !partner||ids.has(partner.id);
  }).map(p=>p.id));
}
/* Queue priority: fewest games this session, then longest current wait.
   A locked partner is an inseparable unit: both must be available before either appears. */
function queueList(){
  const ids=queueEligibleSet();
  return store.players.filter(p=>ids.has(p.id)).sort(fairCompare);
}
function matchSelectionRespectsPartners(ids,eligibleIds){
  const selected=new Set(ids);
  for(const id of selected){
    const player=byId(id);const partner=isPartnerLocked(player)?partnerOf(player):null;
    if(partner&&eligibleIds.has(partner.id)&&!selected.has(partner.id))return false;
  }
  return true;
}
function selectionUnitIds(id,eligibleIds){
  const player=byId(id);if(!player||!eligibleIds.has(id))return [];
  const partner=isPartnerLocked(player)?partnerOf(player):null;
  return partner&&eligibleIds.has(partner.id)?[player.id,partner.id]:[player.id];
}
function normalizeMatchSelection(ids,eligibleIds){
  const chosen=[];const included=new Set();
  uniqueStrings(ids).forEach(id=>{
    if(!eligibleIds.has(id)||included.has(id))return;
    const unit=selectionUnitIds(id,eligibleIds);
    if(!unit.length||chosen.length+unit.filter(x=>!included.has(x)).length>4)return;
    unit.forEach(x=>{if(!included.has(x)){included.add(x);chosen.push(x);}});
  });
  return chosen;
}

function renderFairness(){

  const oneGameRest=store.players.filter(p=>p.inSession&&p.status==='rest'&&p.restMode==='one');

  const low=Math.min(...participants.map(sessionGamesOf));

    ${longest.length?`<span class="fairness-pill"><span class="fair-label">รอนานสุด</span> ${longestNames}${moreLongest>0?' +'+moreLongest:''}</span>`:''}
    ${oneGameRest.length?`<span class="fairness-pill"><span class="fair-label">พัก 1 เกม</span> ${oneGameRest.length} คน</span>`:''}`;
}

/* ---------------- modal ---------------- */
const scrimEl=document.getElementById('scrim');
const sheetEl=document.getElementById('sheet');
const grabEl=sheetEl.querySelector('.grab');
let sheetDrag=null;
let sheetDismissTimer=null;

function resetSheetDragState(){
  if(sheetDismissTimer){clearTimeout(sheetDismissTimer);sheetDismissTimer=null;}
  sheetDrag=null;
  sheetEl.classList.remove('dragging','snapback','closing');
  sheetEl.style.transform='';
  sheetEl.style.opacity='';
}
function canDragSheet(){return !forceGroupSheet&&window.matchMedia('(max-width:559px)').matches;}
function openSheet(html){
  resetSheetDragState();
  document.getElementById('sheetContent').innerHTML=html;
  scrimEl.classList.add('on');
}
function closeSheet(){
  resetSheetDragState();
  scrimEl.classList.remove('on');editingId=null;matchDraft=null;batchDraft=null;
}
function dismissSheetByDrag(drag){
  if(forceGroupSheet){return;}
  const startY=drag?.startY||0;
  const currentY=drag?.currentY||startY;
  const visibleOffset=Math.max(0,currentY-startY);
  sheetEl.classList.remove('dragging','snapback');
  sheetEl.classList.add('closing');
  sheetEl.style.transform=`translateY(${Math.max(visibleOffset,window.innerHeight*.72)}px)`;
  sheetDismissTimer=setTimeout(closeSheet,240);
}
function snapSheetBack(){
  sheetEl.classList.remove('dragging');
  sheetEl.classList.add('snapback');
  sheetEl.style.transform='translateY(0)';
  setTimeout(()=>{
    if(!sheetDrag){
      sheetEl.classList.remove('snapback');
      sheetEl.style.transform='';
    }
  },240);
}

grabEl.addEventListener('pointerdown',e=>{
  if(!canDragSheet()||e.pointerType==='mouse'&&e.button!==0)return;
  if(sheetEl.classList.contains('closing'))return;
  sheetDrag={pointerId:e.pointerId,startY:e.clientY,currentY:e.clientY,lastY:e.clientY,lastAt:performance.now(),velocity:0,moved:false};
  sheetEl.classList.remove('snapback');
  sheetEl.classList.add('dragging');
  try{grabEl.setPointerCapture(e.pointerId);}catch(_){}
  e.preventDefault();
});
grabEl.addEventListener('pointermove',e=>{
  if(!sheetDrag||e.pointerId!==sheetDrag.pointerId)return;
  const now=performance.now();
  const delta=e.clientY-sheetDrag.startY;
  const dy=Math.max(0,delta);
  const elapsed=Math.max(1,now-sheetDrag.lastAt);
  sheetDrag.velocity=(e.clientY-sheetDrag.lastY)/elapsed;
  sheetDrag.lastY=e.clientY;
  sheetDrag.lastAt=now;
  sheetDrag.currentY=e.clientY;
  sheetDrag.moved=sheetDrag.moved||dy>3;
  sheetEl.style.transform=`translateY(${dy}px)`;
  e.preventDefault();
});
function finishSheetDrag(e,cancelled=false){
  if(!sheetDrag||e.pointerId!==sheetDrag.pointerId)return;
  const drag=sheetDrag;
  sheetDrag=null;
  try{grabEl.releasePointerCapture(e.pointerId);}catch(_){}
  const dy=Math.max(0,e.clientY-drag.startY);
  const fastDown=drag.velocity>.65&&dy>28;
  if(!cancelled&&(dy>110||fastDown))dismissSheetByDrag(drag);
  else snapSheetBack();
}
grabEl.addEventListener('pointerup',e=>finishSheetDrag(e));
grabEl.addEventListener('pointercancel',e=>finishSheetDrag(e,true));
grabEl.addEventListener('keydown',e=>{
  if((e.key==='Enter'||e.key===' ')&&canDragSheet()){e.preventDefault();closeSheet();}
});
scrimEl.addEventListener('click',e=>{if(e.target.id==='scrim'&&!forceGroupSheet)closeSheet();});

  const now=Date.now();
  const sameSession=unit.every(p=>p.sessionId===store.session.id);
  const games=sameSession?Math.max(...unit.map(sessionGamesOf)):currentSessionFloor(unit.map(p=>p.id));
  const tie=Math.min(...unit.map(p=>Number(p.sessionTie)||sessionTieFor(p.id)));
  unit.forEach(p=>{
    p.inSession=true;p.status='wait';p.restMode='none';p.restUntilMatchCount=0;p.restReturnStatus='wait';p.sessionGames=games;p.sessionId=store.session.id;
    p.sessionQueueAt=now;p.sessionTie=tie;touchPlayer(p,now);
  });
  render();toast((unit.length===2?'เพิ่ม '+unit[0].name+' และ '+unit[1].name:'เพิ่ม '+player.name)+' เข้าเซสชันแล้ว · เริ่มที่ '+games+' เกม');

function returnUnitToQueue(unit,changedAt,{alignToFloor=false}={}){
  const games=alignToFloor?Math.max(...unit.map(sessionGamesOf),currentSessionFloor(unit.map(p=>p.id))):null;
  unit.forEach(p=>{
    p.status='wait';p.restMode='none';p.restUntilMatchCount=0;p.restReturnStatus='wait';
    if(games!==null)p.sessionGames=games;
    p.sessionQueueAt=changedAt;touchPlayer(p,changedAt);
  });
}
function toggleRest(id){
  const player=byId(id);if(!player)return;
  if(!player.inSession){addToSession(id);return;}
  const unit=partnerUnit(player);

  if(unit.some(p=>playing.has(p.id))){toast(unit.length===2?'คู่ประจำกำลังเล่นอยู่':'คนนี้กำลังเล่นอยู่');return;}
  const changedAt=Date.now();
  if(unit.every(p=>p.status==='done')){
    returnUnitToQueue(unit,changedAt);
    render();toast(unit.length===2?'คู่ประจำกลับเข้าคิวแล้ว':player.name+' กลับเข้าคิวแล้ว');return;
  }
  if(unit.every(p=>p.status==='rest')){
    returnUnitToQueue(unit,changedAt,{alignToFloor:true});
    render();toast(unit.length===2?'คู่ประจำกลับมาเล่นแล้ว':player.name+' กลับมาเล่น');return;
  }
  unit.forEach(p=>{p.status='rest';p.restMode='manual';p.restUntilMatchCount=0;p.restReturnStatus='wait';touchPlayer(p,changedAt);});

  }
  const changedAt=Date.now();
  const until=completedMatchesOfSession()+1;
  unit.forEach(p=>{p.status='rest';p.restMode='one';p.restUntilMatchCount=until;p.restReturnStatus='wait';touchPlayer(p,changedAt);});
  render();toast(unit.length===2?'คู่ประจำพัก 1 เกมแล้ว':player.name+' พัก 1 เกมแล้ว');
}
function releaseOneGameRests(endedAt){
  const completed=completedMatchesOfSession();
  const released=store.players.filter(p=>p.inSession&&p.status==='rest'&&p.restMode==='one'&&Number(p.restUntilMatchCount)<=completed);
  released.forEach(p=>{
    const returnStatus=p.restReturnStatus==='done'?'done':'wait';
    p.status=returnStatus;p.restMode='none';p.restUntilMatchCount=0;p.restReturnStatus='wait';
    if(returnStatus==='wait')p.sessionQueueAt=endedAt;
    touchPlayer(p,endedAt);
  });
  return released;
}

/* ---------------- match building ---------------- */
function chooseRandom(items){
  if(!Array.isArray(items)||!items.length)return null;
  return items[Math.floor(Math.random()*items.length)]||null;
}
/* Randomly choose an option, while giving the people who have waited longer

function chooseWeightedRandom(items,weightFor){

function fairnessRequirementIds(players,slots,eligibleIds){

    let end=index+1;

  matchDraft.selected=normalizeMatchSelection(matchDraft.selected,eligible);
  matchDraft.courtLabel=court.label;
  const selected=matchDraft.selected;
  const chosen=selected.map(byId).filter(Boolean);
  const gt=matchDraft.gameType&&GAME_TYPES[matchDraft.gameType]?matchDraft.gameType:'auto';
  let preview='';
  if(chosen.length===4){
    const split=splitMatchesSelection(matchDraft.split,chosen,gt)?matchDraft.split:bestSplit(chosen,gt);
    if(split){
      split.diff=Math.abs(sum(split.a)-sum(split.b));
      matchDraft.split=split;
      preview=`<div class="balance-note"><span>ฝั่ง A <b>${sum(split.a)}</b> · ${split.a.map(player=>safeText(player.name)).join(', ')}</span></div>
        <div class="balance-note"><span>ฝั่ง B <b>${sum(split.b)}</b> · ${split.b.map(player=>safeText(player.name)).join(', ')}</span></div>
        <div class="swaphint">ต่างกัน ${split.diff} แต้ม · คู่ประจำที่เลือก “เล่นคู่กัน” จะอยู่ฝั่งเดียวกันเสมอ</div>`;
    }else{
      matchDraft.split=null;
      const message=gt==='control'?'เกมคุมต้องมีฝั่งละ 1 มือแรง และ 1 มือเบา':'รายชื่อที่เลือกไม่ตรงกติกาของรูปแบบเกมนี้';
      preview=`<div class="swaphint">${message} — ปรับรายชื่อใหม่</div>`;
    }
  }else{
    matchDraft.split=null;
    preview=`<div class="swaphint">เลือกผู้เล่นให้ครบ 4 คน (ตอนนี้ ${selected.length}/4) · คู่ที่ล็อกไว้จะถูกเลือกพร้อมกัน</div>`;
  }
  openSheet(`<h3>จัดคู่ลงสนาม ${safeText(court.label)}</h3>
    <div class="row between wrap" style="margin:-4px 0 10px">
      <span class="tag" style="margin:0;display:inline-flex;align-items:center;gap:4px">${icon(GAME_TYPES[gt].icon,12)} ${safeText(GAME_TYPES[gt].label)}</span>
      <div class="row" style="gap:6px"><button class="btn mini ghost" onclick="rerollMatchDraft()">↻ สุ่มใหม่</button>
      <button class="btn mini ghost" onclick='openGameTypeChooser(${jsArg(matchDraft.courtId)},${jsArg(court.label)})'>เปลี่ยนรูปแบบ</button></div>
    </div>
    ${preview}
    <div style="max-height:46vh;overflow-y:auto;margin:6px 0">
    ${q.map(player=>{
      const on=selected.includes(player.id);
      const partner=partnerOf(player);
      const mode=partner?(isPartnerLocked(player)?` · คู่กับ ${safeText(partner.name)}`:' · แยกคู่'):'';
      return `<div class="pick ${on?'sel':''}" onclick='togglePick(${jsArg(player.id)})'>
        <div class="cb">${on?icon('check',13):''}</div>
        <div class="avatar sm">${penguinSVG(scarfFor(player.name),26)}</div>
        <div class="nm">${safeText(player.name)}${partner?`<span class="tag" style="margin-left:4px">${isPartnerLocked(player)?'เล่นคู่กัน':'แยกคู่'}</span>`:''}
          ${player.exempt?'<span class="status-dot s-exempt" style="margin-left:4px">'+icon('zap',11)+'</span>':''}
        </div>
        <span class="sk">${player.skill} · ${sessionGamesOf(player)} เกม${mode}</span>
        <button class="icon-btn" style="margin-left:6px" onclick='event.stopPropagation();toggleExempt(${jsArg(player.id)})' title="ยกเว้นกติกาเวียนคิว">${icon('zap',14)}</button>
      </div>`;
    }).join('')}
    </div>
    <button class="btn block" onclick="confirmMatch()" ${selected.length!==4||!matchDraft.split?'style="opacity:.5;pointer-events:none"':''}>เริ่มเกม →</button>`);
}
function togglePick(id){
  if(!matchDraft)return;
  const eligible=new Set(queueList().map(p=>p.id));
  const unit=selectionUnitIds(id,eligible);
  if(!unit.length){toast('ผู้เล่นคนนี้ไม่อยู่ในคิวแล้ว');openMatchDraft();return;}
  const selected=matchDraft.selected;
  const selectedSet=new Set(selected);
  if(unit.every(member=>selectedSet.has(member))){
    matchDraft.selected=selected.filter(member=>!unit.includes(member));
  }else{
    const missing=unit.filter(member=>!selectedSet.has(member));
    if(selected.length+missing.length>4){toast('ต้องเว้นที่สำหรับคู่ประจำทั้งคู่ก่อน');return;}
    matchDraft.selected=[...selected,...missing];
  }
  matchDraft.split=null;
  openMatchDraft();
}
function confirmMatch(){
  const draft=matchDraft;
  if(!draft)return;
  const court=store.courts.find(c=>c.id===draft.courtId);
  if(!court||store.matches.some(match=>match.courtId===draft.courtId)){toast('สนามนี้ไม่พร้อมจัดคู่แล้ว');closeSheet();return;}
  const eligible=new Set(queueList().map(player=>player.id));
  const selected=uniqueStrings(draft.selected);
  const gameType=GAME_TYPES[draft.gameType]?draft.gameType:'auto';
  const players=selected.map(byId).filter(Boolean);
  if(selected.length!==4||players.length!==4||selected.some(id=>!eligible.has(id))||!matchSelectionRespectsPartners(selected,eligible)||!selectionFitsGameType(players,gameType)){
    toast('รายชื่อผู้เล่นไม่ตรงกติกาของรูปแบบเกมนี้ เลือกใหม่อีกครั้ง');openMatchDraft();return;
  }
  const split=splitMatchesSelection(draft.split,players,gameType)?draft.split:null;
  if(!split){toast('คู่ที่แสดงไม่ตรงกติกาแล้ว กรุณาสุ่มหรือเลือกใหม่');openMatchDraft();return;}
  split.diff=Math.abs(sum(split.a)-sum(split.b));
  const now=Date.now();
  store.matches.push({id:mid(),courtId:court.id,side1:split.a.map(player=>player.id),side2:split.b.map(player=>player.id),gameType,sessionId:store.session.id,startedAt:now,updatedAt:now});
  closeSheet();render();toast('เริ่มเกมสนาม '+court.label);
}

function endMatch(courtId){confirmEndMatch(courtId);}
function openEndMatchConfirm(courtId){
  const match=store.matches.find(m=>m.courtId===courtId);if(!match)return;
  const court=store.courts.find(c=>c.id===courtId);
  const {side1,side2}=matchPlayers(match);
  openSheet(`<div class="confirm-hero">
      <div class="artbox">${penguinArt(62)}</div>
      <div><div class="eyebrow">Complete match</div><h3 style="margin:0">จบเกมสนาม ${safeText(court?.label||'')}</h3>
        <p>ยืนยันว่าทั้ง 4 คนเล่นจบแล้ว เพื่ออัปเดตคิวและประวัติการเล่น</p></div>
    </div>
    <div class="confirm-stats"><div class="confirm-stat"><div class="lbl">ผู้เล่นในเกมนี้</div><b>${side1.length+side2.length} คน</b></div>
      <div class="confirm-stat"><div class="lbl">รอบปัจจุบัน</div><b>รอบที่ ${store.round}</b></div></div>
    <div class="confirm-panel"><h4>คู่ที่กำลังเล่น</h4><div class="match-confirm">
      <div class="team"><div class="side-label">ฝั่ง A · รวม ${sum(side1)}</div><div class="names">${side1.map(p=>safeText(p.name)).join('<br>')}</div></div>
      <div class="versus"><span>VS</span></div><div class="team"><div class="side-label">ฝั่ง B · รวม ${sum(side2)}</div><div class="names">${side2.map(p=>safeText(p.name)).join('<br>')}</div></div>
    </div></div><div class="confirm-actions"><button class="btn ghost" onclick="closeSheet()">ยังไม่จบ</button>
      <button class="btn warn" onclick='confirmEndMatch(${jsArg(courtId)})'>ยืนยันจบเกม</button></div>`);
}
function confirmEndMatch(courtId){
  const match=store.matches.find(m=>m.courtId===courtId);if(!match){closeSheet();return;}
  const court=store.courts.find(c=>c.id===courtId);
  const {side1,side2}=matchPlayers(match);
  const endedAt=Date.now();
  store.deletedMatches=normalizeTombstones(store.deletedMatches);
  store.deletedMatches[match.id]=endedAt;
  if(side1.length===2&&side2.length===2){
    const historyId='h_'+match.id;
    if(!store.history.some(h=>h.id===historyId)){
      store.history.push({id:historyId,ts:endedAt,updatedAt:endedAt,courtLabel:court?.label||'',
        side1:side1.map(p=>p.name),side2:side2.map(p=>p.name),
        side1Ids:[...match.side1],side2Ids:[...match.side2],s1:sum(side1),s2:sum(side2)});
    }
    [...match.side1,...match.side2].forEach(id=>{
      const player=byId(id);if(!player)return;
      player.gamesPlayed=gamesOf(player)+1;player.lastPlayedAt=endedAt;
      player.sessionGames=sessionGamesOf(player)+1;player.sessionQueueAt=endedAt;
      if(!player.exempt)player.status='done';touchPlayer(player,endedAt);
    });
  }
  store.matches=store.matches.filter(m=>m.id!==match.id);
  store.session.completedMatches=completedMatchesOfSession()+1;store.session.updatedAt=endedAt;
  const released=releaseOneGameRests(endedAt);
  const advanced=autoRound();
  closeSheet();render();
  const releasedLabel=released.length?' · กลับเข้าคิว '+released.slice(0,2).map(p=>p.name).join(', ')+(released.length>2?' +'+(released.length-2):''):'';
  toast((advanced?'ทุกคนได้เล่นครบ → เริ่มรอบที่ '+store.round:'บันทึกผลสนาม '+(court?.label||'')+' แล้ว')+releasedLabel);
}
function autoRound(){
  const eligible=store.players.filter(p=>p.inSession&&p.status!=='rest'&&!p.exempt);
  if(eligible.length>0&&eligible.every(p=>p.status==='done')){
    const changedAt=Date.now();
    eligible.forEach(player=>{player.status='wait';player.sessionQueueAt=changedAt;touchPlayer(player,changedAt);});
    store.round++;store.roundUpdatedAt=changedAt;return true;
  }
  return false;
}
function resetRound(){
  const changedAt=Date.now();
  store.players.forEach(player=>{if(player.inSession&&player.status==='done'){player.status='wait';player.sessionQueueAt=changedAt;touchPlayer(player,changedAt);}});
  store.round++;store.roundUpdatedAt=changedAt;render();toast('เริ่มรอบใหม่ — ทุกคนกลับเข้าคิว');
}

/* ---------------- court setup ---------------- */
function openCourtSetup(){
  openSheet(`<h3>ตั้งค่าสนาม</h3>
    <div class="field"><label>จำนวนสนาม</label>
      <div class="row"><button class="icon-btn" style="width:44px;height:44px;font-size:20px" onclick="stepCourts(-1)">−</button>
      <input id="courtNum" type="number" value="${store.courts.length}" min="1" max="12" style="text-align:center;font-size:18px;font-weight:800" oninput="renderLabelInputs()">
      <button class="icon-btn" style="width:44px;height:44px;font-size:20px" onclick="stepCourts(1)">＋</button></div></div>
    <div class="field"><label>ชื่อสนาม (แก้ไขได้)</label><div id="labelInputs"></div></div>
    <button class="btn block" onclick="saveCourts()">บันทึกสนาม</button>`);
  renderLabelInputs();
}
function stepCourts(delta){
  const input=document.getElementById('courtNum');
  if(!input)return;
  input.value=Math.max(1,Math.min(12,(parseInt(input.value,10)||1)+delta));
  renderLabelInputs();
}
function renderLabelInputs(){
  const numberInput=document.getElementById('courtNum');
  const box=document.getElementById('labelInputs');
  if(!numberInput||!box)return;
  const count=Math.max(1,Math.min(12,parseInt(numberInput.value,10)||1));
  let html='';
  for(let index=0;index<count;index++){
    const current=store.courts[index]?.label||(index+1).toString();
    html+=`<input class="courtLabel" maxlength="50" style="margin-bottom:6px;padding:9px 12px;border:1.5px solid var(--edge);border-radius:10px;width:100%" value="${safeText(current)}" placeholder="สนาม ${index+1}">`;
  }
  box.innerHTML=html;
}
function saveCourts(){
  const labels=[...document.querySelectorAll('.courtLabel')].map((element,index)=>cleanText(element.value,String(index+1),50));
  const remainingIds=new Set(store.courts.slice(0,labels.length).map(c=>c.id));
  const affectedMatches=store.matches.filter(match=>!remainingIds.has(match.courtId));
  if(affectedMatches.length){
    const affectedLabels=affectedMatches.map(match=>store.courts.find(c=>c.id===match.courtId)?.label||'').filter(Boolean).join(', ');
    toast('ต้องจบเกมที่สนาม '+affectedLabels+' ก่อนลดจำนวนสนาม');
    return;
  }
  const changedAt=Date.now();
  store.deletedCourts=normalizeTombstones(store.deletedCourts);
  store.courts.slice(labels.length).forEach(court=>{store.deletedCourts[court.id]=changedAt;});
  store.courts=labels.map((label,index)=>{
    const current=store.courts[index];
    return current?{...current,label,updatedAt:current.label===label?current.updatedAt:changedAt}:makeCourt(label,changedAt);
  });
  closeSheet();render();toast('บันทึกสนามแล้ว');
}

/* ---------------- danger ---------------- */
function wipeAll(){openWipeAllConfirm();}
function openWipeAllConfirm(){
  const playerCount=store.players.length;
  const matchCount=store.history.length;
  openSheet(`<div class="confirm-hero warn">
      <div class="artbox">${icon('warn',30)}</div>
      <div>
        <div class="eyebrow">Permanent reset</div>
        <h3 style="margin:0">ล้างข้อมูลทั้งหมด?</h3>
        <p>เริ่มก๊วนใหม่จากศูนย์ ข้อมูลที่ล้างแล้วจะไม่สามารถกู้กลับในแอปได้</p>
      </div>
    </div>
    <div class="confirm-stats">
      <div class="confirm-stat"><div class="lbl">รายชื่อผู้เล่น</div><b>${playerCount} คน</b></div>
      <div class="confirm-stat"><div class="lbl">ประวัติการแข่งขัน</div><b>${matchCount} เกม</b></div>
    </div>
    <div class="confirm-panel warn">
      <h4>ข้อมูลที่จะถูกล้าง</h4>
      <div class="confirm-points">
        <div class="confirm-point warn"><span class="dot">${icon('users',13)}</span><span>รายชื่อผู้เล่น ระดับฝีมือ จุดเด่น และหมายเหตุ</span></div>
        <div class="confirm-point warn"><span class="dot">${icon('history',13)}</span><span>ประวัติการแข่งขัน คิว และสถิติทั้งหมด</span></div>
        <div class="confirm-point warn"><span class="dot">${icon('shuttle',13)}</span><span>สนามจะถูกตั้งกลับเป็นสนาม 1 และสนาม 2</span></div>
      </div>
    </div>
    <div class="confirm-actions">
      <button class="btn ghost" onclick="closeSheet()">ยกเลิก</button>
      <button class="btn warn" onclick="confirmWipeAll()">ล้างข้อมูลทั้งหมด</button>
    </div>`);
}
function confirmWipeAll(){
  const wipedAt=Date.now();
  localStorage.removeItem(KEY);
  store.players=[];
  store.courts=[makeCourt('1',wipedAt),makeCourt('2',wipedAt)];
  store.matches=[];store.history=[];
  store.round=1;store.roundUpdatedAt=wipedAt;
  store.session={...newSessionState(),startedAt:wipedAt,updatedAt:wipedAt};
  store.deletedPlayers={};store.deletedCourts={};store.deletedMatches={};
  store.wipedAt=wipedAt;store.updatedAt=wipedAt;
  closeSheet();render();switchTab('courts');toast('ล้างข้อมูลแล้ว');
}

/* ---------------- init ---------------- */
document.getElementById('brandMark').innerHTML=penguinSVG('#ef6349',34);
load();render('init');initCloudSync();
</script>
